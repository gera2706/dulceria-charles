<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comprobante — Dulcería Charles</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ── */
    :root {
      --t-bg: #f5f0f7;
      --t-ticket: #ffffff;
      --t-pink: #e91e8c;
      --t-purple: #7c3aed;
      --t-text: #1a1a2e;
      --t-muted: #888;
      --t-border: #e0d4f5;
      --t-success: #16a34a;
    }
    @media (prefers-color-scheme: dark) {
      :root { --t-bg:#1a1525; --t-ticket:#241d30; --t-text:#f0eaf8; --t-muted:#9b8fb5; --t-border:#3d2f5a; }
    }
    :root[data-theme="light"] { --t-bg:#f5f0f7; --t-ticket:#ffffff; --t-text:#1a1a2e; --t-muted:#888; --t-border:#e0d4f5; }
    :root[data-theme="dark"]  { --t-bg:#1a1525; --t-ticket:#241d30; --t-text:#f0eaf8; --t-muted:#9b8fb5; --t-border:#3d2f5a; }

    /* ── Página ── */
    body { background: var(--t-bg); }
    .comp-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      font-family: 'Courier New', Courier, monospace;
    }

    /* ── Ticket ── */
    .ticket {
      width: 100%;
      max-width: 360px;
      background: var(--t-ticket);
      filter: drop-shadow(0 8px 32px rgba(124,58,237,0.18));
    }
    .ticket::before {
      content: '';
      display: block;
      height: 16px;
      background: radial-gradient(circle at 50% 0%, var(--t-bg) 8px, var(--t-ticket) 8px) repeat-x 0 0 / 20px 16px;
    }
    .ticket::after {
      content: '';
      display: block;
      height: 16px;
      background: radial-gradient(circle at 50% 100%, var(--t-bg) 8px, var(--t-ticket) 8px) repeat-x 0 0 / 20px 16px;
    }
    .ticket-inner { padding: 0.5rem 1.6rem 1rem; }

    /* ── Cabecera ── */
    .ticket-header { text-align: center; padding: 0.8rem 0 1rem; }
    .brand-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem; color: var(--t-pink);
      letter-spacing: 1px; line-height: 1;
    }
    .brand-sub { font-size: 0.68rem; color: var(--t-muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }

    .t-dash { border: none; border-top: 1px dashed var(--t-border); margin: 0.7rem 0; }

    /* ── Confirmado ── */
    .confirmed { text-align: center; padding: 0.6rem 0; }
    .check-circle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      background: var(--t-success); border-radius: 50%;
      color: #fff; font-size: 1.1rem; margin-bottom: 0.4rem;
    }
    .confirmed-title { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--t-purple); display: block; }
    .confirmed-sub { font-size: 0.72rem; color: var(--t-muted); }

    /* ── Número de pedido ── */
    .order-num { text-align: center; margin: 0.8rem 0; }
    .order-label { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--t-muted); }
    .order-number { font-family: 'Fredoka One', cursive; font-size: 2.2rem; color: var(--t-pink); line-height: 1.1; letter-spacing: 2px; }
    .order-date { font-size: 0.68rem; color: var(--t-muted); margin-top: 2px; }
    .estado-badge {
      display: inline-block;
      background: rgba(124,58,237,0.12); color: var(--t-purple);
      font-size: 0.65rem; font-weight: bold;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 2px 10px; border-radius: 20px; margin-top: 4px;
    }

    /* ── Sección label ── */
    .section-label { font-size: 0.62rem; letter-spacing: 3px; text-transform: uppercase; color: var(--t-pink); margin-bottom: 0.4rem; }

    /* ── Filas de info ── */
    .info-row { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--t-text); padding: 1px 0; }
    .info-row .lbl { color: var(--t-muted); }

    /* ── Productos ── */
    .items-header {
      display: flex; gap: 0.5rem;
      font-size: 0.62rem; letter-spacing: 1px;
      text-transform: uppercase; color: var(--t-muted); margin-bottom: 0.3rem;
    }
    .item-row { display: flex; gap: 0.5rem; padding: 3px 0; align-items: baseline; font-size: 0.75rem; color: var(--t-text); }
    .item-name { flex: 1; line-height: 1.3; }
    .item-qty  { width: 24px; text-align: center; color: var(--t-muted); font-variant-numeric: tabular-nums; }
    .item-price { width: 44px; text-align: right; font-variant-numeric: tabular-nums; }
    .item-total { width: 48px; text-align: right; font-weight: bold; font-variant-numeric: tabular-nums; }
    .total-row {
      display: flex; justify-content: space-between;
      font-size: 0.95rem; font-weight: bold; color: var(--t-pink);
      padding: 0.4rem 0 0; margin-top: 0.3rem;
      border-top: 2px solid var(--t-pink);
      font-variant-numeric: tabular-nums;
    }

    /* ── Pickup ── */
    .pickup-block {
      background: rgba(22,163,74,0.07);
      border: 1px dashed #86efac;
      border-radius: 6px;
      padding: 0.7rem 0.9rem;
      font-size: 0.73rem; color: var(--t-text); line-height: 1.7;
    }
    .pickup-note { font-weight: bold; color: var(--t-success); font-size: 0.7rem; margin-top: 0.4rem; display: block; }

    /* ── Footer del ticket ── */
    .ticket-footer { text-align: center; padding: 0.8rem 0 0.4rem; }
    .ticket-footer .gracias { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--t-purple); display: block; margin-bottom: 4px; }
    .ticket-footer p { font-size: 0.65rem; color: var(--t-muted); letter-spacing: 1px; line-height: 1.8; }

    /* ── Botones ── */
    .comp-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; flex-wrap: wrap; justify-content: center; max-width: 360px; width: 100%; }
    .btn-print {
      background: var(--t-pink); color: #fff; border: none;
      padding: 0.6rem 1.4rem; border-radius: 50px;
      font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer;
    }
    .btn-home {
      background: transparent; color: var(--t-purple);
      border: 2px solid var(--t-purple);
      padding: 0.6rem 1.4rem; border-radius: 50px;
      font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; text-decoration: none; display: inline-flex; align-items: center;
    }

    /* ── Loading / Error ── */
    .comp-loading { text-align: center; padding: 4rem 1rem; color: var(--t-muted); font-size: 1.1rem; }

    /* ── Imprimir ── */
    @media print {
      body { background: #fff; }
      .navbar, .comp-actions, footer { display: none !important; }
      .ticket { filter: none; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">🍬 Dulcería Charles</div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="nav-drawer" id="nav-drawer" aria-hidden="true">
    <div class="drawer-header">🍬 Menú</div>
    <a href="index.html">🏠 Inicio</a>
    <a href="catalogo.html">🍭 Catálogo</a>
    <a href="favoritos.html">❤️ Mis Favoritos</a>
    <a href="carrito.html">🛒 Carrito <span class="drawer-cart-count" id="cart-count">0</span></a>
    <a href="pedidos.html">📦 Mis Pedidos <span class="drawer-cart-count" id="pedidos-count" style="display:none;">0</span></a>
    <a href="contacto.html">📬 Contacto</a>
  </nav>

  <!-- Contenido del comprobante (llenado por comprobante.js) -->
  <div class="comp-wrapper" id="comp-wrapper">
    <div class="comp-loading">Cargando comprobante…</div>
  </div>

  <footer class="footer" style="margin-top:2rem;">
    <div class="footer-bottom"><p>© 2026 Dulcería Charles · Ciudad de México</p></div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/comprobante.js"></script>
</body>
</html>
