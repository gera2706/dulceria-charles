  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <span>🍬</span>
        Dulcería Charles
      </div>

      <h1 class="auth-title">Mi cuenta</h1>
      <p class="auth-subtitle" id="cuenta-rol">Edita tu información personal</p>

      <div class="auth-global-err" id="global-err"></div>
      <div class="auth-global-ok" id="global-ok"></div>

      <form id="perfil-form" novalidate>

        <div class="auth-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="name" />
          <span class="auth-err" id="err-nombre"></span>
        </div>

        <div class="auth-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" />
          <span class="auth-err" id="err-email"></span>
        </div>

        <div class="auth-divider">Cambiar contraseña (opcional)</div>

        <div class="auth-group">
          <label for="password-actual">Contraseña actual</label>
          <div class="auth-pass-wrap">
            <input type="password" id="password-actual" placeholder="Solo si vas a cambiarla" autocomplete="current-password" />
            <button type="button" class="auth-pass-toggle" data-target="password-actual" title="Ver contraseña">👁️</button>
          </div>
          <span class="auth-err" id="err-password-actual"></span>
        </div>

        <div class="auth-group">
          <label for="password-nueva">Nueva contraseña</label>
          <div class="auth-pass-wrap">
            <input type="password" id="password-nueva" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
            <button type="button" class="auth-pass-toggle" data-target="password-nueva" title="Ver contraseña">👁️</button>
          </div>
          <span class="auth-err" id="err-password-nueva"></span>
        </div>

        <div class="auth-group">
          <label for="password-confirmar">Confirmar nueva contraseña</label>
          <div class="auth-pass-wrap">
            <input type="password" id="password-confirmar" placeholder="Repite la nueva contraseña" autocomplete="new-password" />
            <button type="button" class="auth-pass-toggle" data-target="password-confirmar" title="Ver contraseña">👁️</button>
          </div>
          <span class="auth-err" id="err-password-confirmar"></span>
        </div>

        <button type="submit" class="auth-btn">Guardar cambios</button>
      </form>

      <div class="auth-switch" style="margin-top:1rem;">
        <a href="index.html" style="color:var(--text-light);font-weight:600;">← Volver a la tienda</a>
      </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/cat-icon.js"></script>
  <script>requireLogin();</script>
  <script>
    var usuarioActual = getCurrentUser();

    /* Prellenar el formulario con los datos actuales */
    if (usuarioActual) {
      document.getElementById('nombre').value = usuarioActual.nombre || '';
      document.getElementById('email').value  = usuarioActual.email  || '';
      document.getElementById('cuenta-rol').textContent =
        usuarioActual.rol === 'admin' ? 'Cuenta de administrador' : 'Cuenta de cliente';
    }

    /* Mostrar/ocultar cada campo de contraseña con su propio botón 👁️ */
    document.querySelectorAll('.auth-pass-toggle').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var inp  = document.getElementById(this.dataset.target);
        var show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        this.textContent = show ? '🙈' : '👁️';
      });
    });

    document.getElementById('perfil-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      var nombre      = document.getElementById('nombre').value.trim();
      var email       = document.getElementById('email').value.trim();
      var passActual  = document.getElementById('password-actual').value;
      var passNueva   = document.getElementById('password-nueva').value;
      var passConfirm = document.getElementById('password-confirmar').value;

      var globalErr = document.getElementById('global-err');
      var globalOk  = document.getElementById('global-ok');
      var btn       = this.querySelector('button[type=submit]');
      var ok = true;

      ['nombre', 'email', 'password-actual', 'password-nueva', 'password-confirmar'].forEach(function (id) {
        document.getElementById('err-' + id) && (document.getElementById('err-' + id).textContent = '');
        document.getElementById(id).classList.remove('invalid');
      });
      globalErr.classList.remove('visible');
      globalOk.classList.remove('visible');

      if (!nombre) { document.getElementById('err-nombre').textContent = 'Ingresa tu nombre.'; document.getElementById('nombre').classList.add('invalid'); ok = false; }
      if (!email)  { document.getElementById('err-email').textContent  = 'Ingresa tu correo.';  document.getElementById('email').classList.add('invalid');  ok = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('err-email').textContent = 'Ingresa un correo válido.'; document.getElementById('email').classList.add('invalid'); ok = false; }

      // La contraseña solo se valida en el navegador si el usuario quiere cambiarla
      if (passNueva || passConfirm || passActual) {
        if (!passActual) { document.getElementById('err-password-actual').textContent = 'Ingresa tu contraseña actual.'; document.getElementById('password-actual').classList.add('invalid'); ok = false; }
        if (passNueva.length < 6) { document.getElementById('err-password-nueva').textContent = 'Mínimo 6 caracteres.'; document.getElementById('password-nueva').classList.add('invalid'); ok = false; }
        if (passNueva !== passConfirm) { document.getElementById('err-password-confirmar').textContent = 'Las contraseñas no coinciden.'; document.getElementById('password-confirmar').classList.add('invalid'); ok = false; }
      }

      if (!ok) return;

      btn.disabled = true;
      btn.textContent = 'Guardando…';

      try {
        var datos = { nombre: nombre, email: email };
        if (passNueva) { datos.passwordActual = passActual; datos.passwordNueva = passNueva; }

        await apiActualizarPerfil(datos);

        document.getElementById('password-actual').value = '';
        document.getElementById('password-nueva').value = '';
        document.getElementById('password-confirmar').value = '';

        globalOk.textContent = 'Tus datos se guardaron correctamente.';
        globalOk.classList.add('visible');
      } catch (err) {
        globalErr.textContent = err.message;
        globalErr.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar cambios';
      }
    });
  </script>
