  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <span><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.4"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.4"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.4"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.4"/></svg></span>
        Dulcería Charles
      </div>

      <h1 class="auth-title">Crea tu cuenta</h1>
      <p class="auth-subtitle">Es gratis y solo toma un momento</p>

      <div class="auth-global-err" id="global-err"></div>

      <form id="register-form" novalidate>

        <div class="auth-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="name" />
          <span class="auth-err" id="err-nombre"></span>
        </div>

        <div class="auth-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" />
          <span class="auth-err" id="err-email"></span>
        </div>

        <div class="auth-group">
          <label for="password">Contraseña</label>
          <div class="auth-pass-wrap">
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
            <button type="button" class="auth-pass-toggle" id="toggle-pass" title="Ver contraseña">👁️</button>
          </div>
          <span class="auth-err" id="err-password"></span>
        </div>

        <div class="auth-group">
          <label for="password2">Confirmar contraseña</label>
          <div class="auth-pass-wrap">
            <input type="password" id="password2" placeholder="Repite tu contraseña" autocomplete="new-password" />
            <button type="button" class="auth-pass-toggle" id="toggle-pass2" title="Ver contraseña">👁️</button>
          </div>
          <span class="auth-err" id="err-password2"></span>
        </div>

        <button type="submit" class="auth-btn">Crear cuenta gratis</button>
      </form>

      <div class="auth-divider">o</div>

      <div class="auth-switch">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </div>
      <div class="auth-switch" style="margin-top:0.5rem;">
        <a href="index.html" style="color:var(--text-light);font-weight:600;">← Volver a la tienda</a>
      </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/cat-icon.js"></script>
  <script>
    /* Si ya está logueado, redirigir */
    (function() {
      if (isLoggedIn()) window.location.href = 'index.html';
    })();

    /* Toggle password */
    function togglePass(btnId, inputId) {
      document.getElementById(btnId).addEventListener('click', function() {
        var inp  = document.getElementById(inputId);
        var show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        this.textContent = show ? '🙈' : '👁️';
      });
    }
    togglePass('toggle-pass',  'password');
    togglePass('toggle-pass2', 'password2');

    /* Submit */
    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var nombre    = document.getElementById('nombre').value.trim();
      var email     = document.getElementById('email').value.trim();
      var password  = document.getElementById('password').value;
      var password2 = document.getElementById('password2').value;
      var globalErr = document.getElementById('global-err');
      var btn       = this.querySelector('button[type=submit]');
      var ok = true;

      ['nombre','email','password','password2'].forEach(function(id) {
        document.getElementById('err-' + id).textContent = '';
        document.getElementById(id).classList.remove('invalid');
      });
      globalErr.classList.remove('visible');

      if (!nombre) {
        document.getElementById('err-nombre').textContent = 'Ingresa tu nombre.';
        document.getElementById('nombre').classList.add('invalid'); ok = false;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('err-email').textContent = 'Ingresa un correo válido.';
        document.getElementById('email').classList.add('invalid'); ok = false;
      }
      if (password.length < 6) {
        document.getElementById('err-password').textContent = 'Mínimo 6 caracteres.';
        document.getElementById('password').classList.add('invalid'); ok = false;
      }
      if (password !== password2) {
        document.getElementById('err-password2').textContent = 'Las contraseñas no coinciden.';
        document.getElementById('password2').classList.add('invalid'); ok = false;
      }
      if (!ok) return;

      btn.disabled = true;
      btn.textContent = 'Creando cuenta…';

      try {
        await apiRegistro(nombre, email, password, false);
        window.location.href = 'catalogo.html';
      } catch (err) {
        globalErr.textContent = err.message;
        globalErr.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Crear mi cuenta';
      }
    });
  </script>
