<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Dulcería Charles</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">🍬 Dulcería Charles</div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="nav-drawer" id="nav-drawer" aria-hidden="true">
    <div class="drawer-header">🍬 Menú</div>
    <a href="index.html">🏠 Inicio</a>
    <a href="catalogo.html">🍭 Catálogo</a>
    <a href="favoritos.html">❤️ Mis Favoritos</a>
    <a href="carrito.html">🛒 Carrito <span class="drawer-cart-count" id="cart-count">0</span></a>
    <a href="pedidos.html">📦 Mis Pedidos <span class="drawer-cart-count" id="pedidos-count" style="display:none;">0</span></a>
    <a href="contacto.html">📬 Contacto</a>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <span>🍬</span>
        Dulcería Charles
      </div>

      <h1 class="auth-title">Bienvenido de vuelta</h1>
      <p class="auth-subtitle">Inicia sesión para continuar comprando</p>

      <div class="auth-global-err" id="global-err"></div>

      <form id="login-form" novalidate>

        <div class="auth-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" />
          <span class="auth-err" id="err-email"></span>
        </div>

        <div class="auth-group">
          <label for="password">Contraseña</label>
          <div class="auth-pass-wrap">
            <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password" />
            <button type="button" class="auth-pass-toggle" id="toggle-pass" title="Ver contraseña">👁️</button>
          </div>
          <span class="auth-err" id="err-password"></span>
        </div>

        <!-- Recordarme -->
        <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.8rem;">
          <input type="checkbox" id="remember" style="width:17px;height:17px;accent-color:var(--pink);cursor:pointer;" />
          <label for="remember" style="font-size:0.9rem;font-weight:600;color:var(--text);cursor:pointer;">
            Mantener sesión iniciada
          </label>
        </div>

        <button type="submit" class="auth-btn">🔐 Iniciar sesión</button>
      </form>

      <div class="auth-divider">o</div>

      <div class="auth-switch">
        ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
      </div>
      <div class="auth-switch" style="margin-top:0.5rem;">
        <a href="index.html" style="color:var(--text-light);font-weight:600;">← Volver a la tienda</a>
      </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    /* Si ya está logueado, redirigir */
    (function() {
      if (isLoggedIn()) {
        var params = new URLSearchParams(window.location.search);
        window.location.href = params.get('next') || 'index.html';
      }
    })();

    /* Toggle password */
    document.getElementById('toggle-pass').addEventListener('click', function() {
      var inp = document.getElementById('password');
      var show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      this.textContent = show ? '🙈' : '👁️';
    });

    /* Submit */
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var email     = document.getElementById('email').value.trim();
      var password  = document.getElementById('password').value;
      var remember  = document.getElementById('remember').checked;
      var globalErr = document.getElementById('global-err');
      var btn       = this.querySelector('button[type=submit]');
      var ok = true;

      ['email','password'].forEach(function(id) {
        document.getElementById('err-' + id).textContent = '';
        document.getElementById(id).classList.remove('invalid');
      });
      globalErr.classList.remove('visible');

      if (!email)    { document.getElementById('err-email').textContent = 'Ingresa tu correo.'; document.getElementById('email').classList.add('invalid'); ok = false; }
      if (!password) { document.getElementById('err-password').textContent = 'Ingresa tu contraseña.'; document.getElementById('password').classList.add('invalid'); ok = false; }
      if (!ok) return;

      btn.disabled = true;
      btn.textContent = 'Iniciando sesión…';

      try {
        await apiLogin(email, password, remember);
        var params = new URLSearchParams(window.location.search);
        window.location.href = params.get('next') || 'index.html';
      } catch (err) {
        globalErr.textContent = err.message;
        globalErr.classList.add('visible');
        btn.disabled = false;
        btn.textContent = '🔐 Iniciar sesión';
      }
    });
  </script>
</body>
</html>
